<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图书管理系统 - 管理面板</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>图书管理系统</h2>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-tab="dashboard">
          <i class="icon">📊</i>
          <span>概览</span>
        </a>
        <a href="#" class="nav-item" data-tab="books">
          <i class="icon">📚</i>
          <span>图书管理</span>
        </a>
        <a href="#" class="nav-item" data-tab="borrows">
          <i class="icon">📖</i>
          <span>借阅管理</span>
        </a>
        <a href="#" class="nav-item admin-only" data-tab="users">
          <i class="icon">👥</i>
          <span>用户管理</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <span class="user-name" id="currentUserName"></span>
          <span class="user-role" id="currentUserRole"></span>
        </div>
        <button id="logoutBtn" class="btn btn-outline btn-sm">退出登录</button>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 概览页面 -->
      <div id="tab-dashboard" class="tab-content active">
        <div class="page-header">
          <h1>系统概览</h1>
        </div>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon">📚</div>
            <div class="stat-info">
              <h3>图书总数</h3>
              <p class="stat-value" id="totalBooks">0</p>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">✅</div>
            <div class="stat-info">
              <h3>可借阅</h3>
              <p class="stat-value" id="availableBooks">0</p>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">📖</div>
            <div class="stat-info">
              <h3>借阅中</h3>
              <p class="stat-value" id="borrowingBooks">0</p>
            </div>
          </div>
          <div class="stat-card admin-only">
            <div class="stat-icon">👥</div>
            <div class="stat-info">
              <h3>用户总数</h3>
              <p class="stat-value" id="totalUsers">0</p>
            </div>
          </div>
        </div>
        <div class="my-borrows-section">
          <h2>我的借阅</h2>
          <div id="myBorrowsList" class="borrows-list"></div>
        </div>
      </div>

      <!-- 图书管理页面 -->
      <div id="tab-books" class="tab-content">
        <div class="page-header">
          <h1>图书管理</h1>
          <button class="btn btn-primary admin-only" id="addBookBtn">添加图书</button>
        </div>
        <div class="search-bar">
          <input type="text" id="bookSearch" placeholder="搜索图书（标题、作者、ISBN）..." class="search-input">
          <select id="bookCategoryFilter" class="filter-select">
            <option value="">所有分类</option>
            <option value="文学">文学</option>
            <option value="科技">科技</option>
            <option value="艺术">艺术</option>
            <option value="历史">历史</option>
            <option value="哲学">哲学</option>
            <option value="其他">其他</option>
          </select>
          <select id="bookStatusFilter" class="filter-select">
            <option value="">所有状态</option>
            <option value="available">可借阅</option>
            <option value="borrowed">已借完</option>
          </select>
          <button class="btn btn-secondary" id="searchBookBtn">搜索</button>
        </div>
        <div id="booksList" class="books-grid"></div>
      </div>

      <!-- 借阅管理页面 -->
      <div id="tab-borrows" class="tab-content">
        <div class="page-header">
          <h1>借阅管理</h1>
          <select id="borrowStatusFilter" class="filter-select">
            <option value="">所有状态</option>
            <option value="borrowed">借阅中</option>
            <option value="overdue">已逾期</option>
            <option value="returned">已归还</option>
          </select>
        </div>
        <div id="borrowsList" class="table-container"></div>
      </div>

      <!-- 用户管理页面 -->
      <div id="tab-users" class="tab-content">
        <div class="page-header">
          <h1>用户管理</h1>
          <button class="btn btn-primary" id="addUserBtn">添加用户</button>
        </div>
        <div id="usersList" class="table-container"></div>
      </div>
    </main>
  </div>

  <!-- 模态框 -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="modal-close">&times;</span>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- 提示框 -->
  <div id="toast" class="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
